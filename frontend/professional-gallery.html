<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Gallery | Anshul Khandar</title>
    <meta name="description" content="Professional Gallery - Events and achievements of Anshul Khandar">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="professional-gallery.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-bracket">&lt;</span>Anshul Khandar<span class="logo-bracket">/&gt;</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html#skills" class="nav-link">Skills</a></li>
                <li><a href="index.html#education" class="nav-link">Education</a></li>
                <li><a href="index.html#experience" class="nav-link">Experience</a></li>
                <li><a href="index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact Me</a></li>
                <li><a href="professional-gallery.html" class="nav-link active">Professional Gallery</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Gallery Header -->
    <section class="gallery-header">
        <div class="gallery-header-content">
            <h1>Professional Gallery</h1>
            <p>Events, achievements, and memorable moments from my professional journey</p>
        </div>
        <div class="gallery-glow"></div>
    </section>

    <!-- Gallery Filter -->
    <section class="gallery-filter">
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Event">Events</button>
            <button class="filter-btn" data-filter="Achievement">Achievements</button>
            <button class="filter-btn" data-filter="Certificate">Certificates</button>
            <button class="filter-btn" data-filter="Workshop">Workshops</button>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="gallery-section">
        <div class="gallery-container">
            <div class="gallery-grid" id="galleryGrid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading gallery...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-overlay" id="lightboxOverlay"></div>
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose">
                <i class="fas fa-times"></i>
            </button>
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="lightbox-image-container">
                <img src="" alt="" id="lightboxImage">
            </div>
            <button class="lightbox-nav lightbox-next" id="lightboxNext">
                <i class="fas fa-chevron-right"></i>
            </button>
            <div class="lightbox-info" id="lightboxInfo">
                <h3 id="lightboxTitle"></h3>
                <p id="lightboxDescription"></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2024 Anshul Khandar. Built with passion and code.</p>
            <div class="footer-social">
                <a href="https://github.com/anshulkhandar" target="_blank" rel="noopener" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/anshul-khandar-b4986932a" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://www.instagram.com/anshul_khandar/" target="_blank" rel="noopener" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="professional-gallery.js"></script>
</body>
</html>
